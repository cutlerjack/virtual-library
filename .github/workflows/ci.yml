name: CI

on:
  push:
    branches:
      - master
      - 'codex/**'
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run browser smoke tests
        run: npm run test:e2e

      - name: Check desktop app
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run native smoke tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  desktop-smoke:
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri desktop test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            webkit2gtk-driver \
            xvfb

      - name: Install dependencies
        run: npm ci

      - name: Install Tauri driver
        run: cargo install tauri-driver --locked --version 2.0.5

      - name: Run desktop smoke harness
        run: xvfb-run -a npm run test:desktop-e2e
